<div class="register-container">
  <h2>Register</h2>

  <div *ngIf="success" class="alert alert-success">
    Registration successful! Redirecting to login...
  </div>

  <form (ngSubmit)="onSubmit()" #registerForm="ngForm" *ngIf="!success">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input
        id="firstName"
        type="text"
        class="form-control"
        [(ngModel)]="model.firstName"
        name="firstName"
        required
        #firstName="ngModel"
      />
      <div *ngIf="firstName.invalid && firstName.touched" class="text-danger">
        First name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input
        id="lastName"
        type="text"
        class="form-control"
        [(ngModel)]="model.lastName"
        name="lastName"
        required
        #lastName="ngModel"
      />
      <div *ngIf="lastName.invalid && lastName.touched" class="text-danger">
        Last name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        class="form-control"
        [(ngModel)]="model.email"
        name="email"
        required
        email
        #email="ngModel"
      />
      <div *ngIf="email.invalid && email.touched" class="text-danger">
        Valid email is required.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        class="form-control"
        [(ngModel)]="model.password"
        name="password"
        required
        minlength="6"
        #password="ngModel"
      />
      <div *ngIf="password.invalid && password.touched" class="text-danger">
        Password must be at least 6 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        class="form-control"
        [(ngModel)]="model.confirmPassword"
        name="confirmPassword"
        required
        #confirmPassword="ngModel"
      />
      <div *ngIf="confirmPassword.invalid && confirmPassword.touched" class="text-danger">
        Confirm password is required.
      </div>
    </div>

    <div *ngIf="error" class="text-danger">{{ error }}</div>

    <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid">
      Register
    </button>

    <p class="mt-2">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </form>
</div>
