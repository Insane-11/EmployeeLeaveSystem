<div *ngIf="loading" class="spinner-overlay">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<h4 class="mb-4">User Management</h4>

<div class="table-container">
  <table class="table table-striped table-hover" *ngIf="users.length > 0">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Department</th>
        <th>Active</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users">
        <td>{{ u.fullName }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.roleName }}</td>
        <td>{{ u.department || '—' }}</td>
        <td>
          <span class="badge" [class.bg-success]="u.isActive" [class.bg-danger]="!u.isActive">
            {{ u.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" (click)="openEdit(u)">Edit</button>
          <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(u)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<p *ngIf="users.length === 0 && !loading" class="text-muted">No users found.</p>

<!-- Edit Modal -->
<div class="modal fade" [class.show]="!!editUser" [style.display]="editUser ? 'block' : 'none'" tabindex="-1" *ngIf="editUser">
  <div class="modal-dialog" style="z-index: 1060">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit User</h5>
        <button type="button" class="btn-close" (click)="editUser = null"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">First Name</label>
          <input class="form-control" [(ngModel)]="editModel.firstName" />
        </div>
        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input class="form-control" [(ngModel)]="editModel.lastName" />
        </div>
        <div class="mb-3">
          <label class="form-label">Department</label>
          <input class="form-control" [(ngModel)]="editModel.department" />
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="isActive" [(ngModel)]="editModel.isActive" />
          <label class="form-check-label" for="isActive">Active</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="editUser = null">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="saveEdit()">Save</button>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" (click)="editUser = null"></div>
</div>
