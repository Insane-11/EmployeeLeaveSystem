<div *ngIf="loading" class="spinner-overlay">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<h4 class="mb-4">All Leave Requests</h4>

<div class="row mb-3">
  <div class="col-md-3">
    <select class="form-select" [(ngModel)]="filterStatus" (change)="applyFilters()">
      <option value="">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>
</div>

<div class="table-container">
  <table class="table table-striped table-hover" *ngIf="paged.length > 0">
    <thead class="table-dark">
      <tr>
        <th>Employee</th>
        <th>Type</th>
        <th>Dates</th>
        <th>Days</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of paged">
        <td>{{ r.employeeName }}</td>
        <td>{{ r.leaveType }}</td>
        <td>{{ r.startDate | date:'shortDate' }} – {{ r.endDate | date:'shortDate' }}</td>
        <td>{{ r.durationDays }}</td>
        <td>
          <span class="badge" [class.bg-warning]="r.status === 'Pending'"
                [class.bg-success]="r.status === 'Approved'"
                [class.bg-danger]="r.status === 'Rejected'"
                [class.bg-secondary]="r.status === 'Cancelled'">
            {{ r.status }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-success me-1" *ngIf="r.status === 'Pending'" (click)="approve(r.id)">Approve</button>
          <button class="btn btn-sm btn-danger" *ngIf="r.status === 'Pending'" (click)="reject(r.id)">Reject</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<p *ngIf="paged.length === 0 && !loading" class="text-muted">No requests found.</p>

<nav *ngIf="filtered.length > pageSize" class="mt-3">
  <ul class="pagination pagination-sm justify-content-center">
    <li class="page-item" [class.disabled]="page === 1">
      <a class="page-link" (click)="page = page - 1">Previous</a>
    </li>
    <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index"
        [class.active]="page === i + 1">
      <a class="page-link" (click)="page = i + 1">{{ i + 1 }}</a>
    </li>
    <li class="page-item" [class.disabled]="page === totalPages">
      <a class="page-link" (click)="page = page + 1">Next</a>
    </li>
  </ul>
</nav>
