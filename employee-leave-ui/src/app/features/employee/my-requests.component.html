<div *ngIf="loading" class="spinner-overlay">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<h4 class="mb-4">My Leave Requests</h4>

<div class="row mb-3">
  <div class="col-md-4">
    <select class="form-select" [(ngModel)]="filterStatus" (change)="applyFilters()">
      <option value="">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>
</div>

<div class="table-container">
  <table class="table table-striped table-hover" *ngIf="pagedRequests.length > 0">
    <thead class="table-dark">
      <tr>
        <th>Type</th>
        <th>Start</th>
        <th>End</th>
        <th>Days</th>
        <th>Status</th>
        <th>Submitted</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of pagedRequests">
        <td>{{ r.leaveType }}</td>
        <td>{{ r.startDate | date:'shortDate' }}</td>
        <td>{{ r.endDate | date:'shortDate' }}</td>
        <td>{{ r.durationDays }}</td>
        <td>
          <span class="badge" [class.bg-warning]="r.status === 'Pending'"
                [class.bg-success]="r.status === 'Approved'"
                [class.bg-danger]="r.status === 'Rejected'"
                [class.bg-secondary]="r.status === 'Cancelled'">
            {{ r.status }}
          </span>
        </td>
        <td>{{ r.submittedAt | date:'shortDate' }}</td>
        <td>
          <button class="btn btn-sm btn-outline-danger" *ngIf="r.status === 'Pending'"
                  (click)="cancelRequest(r.id)">Cancel</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<p *ngIf="pagedRequests.length === 0 && !loading" class="text-muted">No requests found.</p>

<nav *ngIf="filteredRequests.length > pageSize" class="mt-3">
  <ul class="pagination pagination-sm justify-content-center">
    <li class="page-item" [class.disabled]="page === 1">
      <a class="page-link" (click)="page = page - 1">Previous</a>
    </li>
    <li class="page-item" *ngFor="let p of [].constructor(totalPages); let i = index"
        [class.active]="page === i + 1">
      <a class="page-link" (click)="page = i + 1">{{ i + 1 }}</a>
    </li>
    <li class="page-item" [class.disabled]="page === totalPages">
      <a class="page-link" (click)="page = page + 1">Next</a>
    </li>
  </ul>
</nav>
