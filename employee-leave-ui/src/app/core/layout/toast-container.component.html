<div class="toast-container">
  <div *ngFor="let msg of toastService.messages" class="toast show align-items-center text-bg-{{msg.type === 'error' ? 'danger' : msg.type}} border-0 mb-2">
    <div class="d-flex">
      <div class="toast-body">
        {{ msg.text }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove(msg.id)"></button>
    </div>
  </div>
</div>
